{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Potato Disease Detector</title>
    
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="container">

    <div class="header">
        <h1><i class="fa-solid fa-seedling"></i> Potato Disease Detector</h1>
        <p>Helping farmers identify plant diseases quickly 🌱</p>
    </div>

    <div class="card">

        <!-- ✅ IMPORTANT: add id -->
        <form method="POST" enctype="multipart/form-data" class="form-box" id="uploadForm">
            {% csrf_token %}

            <label class="upload-box">
                <i class="fa-solid fa-cloud-arrow-up"></i>
                <span>Upload leaf image</span>
                
                <!-- ❌ removed required -->
                <input type="file" name="image" id="imageInput">
            </label>

            <p id="errorMsg" class="error-msg"></p>

            <div class="preview-container">
                <img id="preview" />
            </div>

            <button type="submit" class="btn">
                <i class="fa-solid fa-magnifying-glass"></i> Detect Disease
            </button>
        </form>

    </div>

</div>

<script src="{% static 'js/script.js' %}"></script>
</body>
</html>
